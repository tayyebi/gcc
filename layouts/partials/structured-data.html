<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "{{ "images/logo.png" | absURL }}",
  "description": "{{ .Site.Params.description }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "{{ .Site.Params.contact.email }}",
    "telephone": "{{ .Site.Params.contact.phone }}",
    "contactType": "Customer Service"
  },
  "sameAs": [
    "https://twitter.com/globalcommerce",
    "https://linkedin.com/company/globalcommercecouncil"
  ]
}
</script>

{{ if .IsPage }}
{{ if eq .Type "products" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}",
  "url": "{{ .Permalink }}",
  {{ with .Params.images }}
  "image": "{{ index . 0 | absURL }}",
  {{ end }}
  {{ with .Params.price }}
  "offers": {
    "@type": "Offer",
    "price": "{{ . }}",
    "priceCurrency": "USD"
  },
  {{ end }}
  "brand": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}"
  }
}
</script>
{{ end }}

{{ if eq .Type "insights" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}",
  "url": "{{ .Permalink }}",
  {{ with .Params.images }}
  "image": "{{ index . 0 | absURL }}",
  {{ end }}
  "datePublished": "{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "images/logo.png" | absURL }}"
    }
  }
}
</script>
{{ end }}
{{ end }}
