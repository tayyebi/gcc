<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "{{ "images/logo.png" | absURL }}",
  "description": "{{ .Site.Params.description }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "{{ .Site.Params.contact.email }}",
    "contactType": "Customer Service"
  },
  "sameAs": [
    "https://twitter.com/globalcommerce",
    "https://linkedin.com/company/globalcommercecouncil"
  ]
}
</script>

{{ if .IsPage }}
{{ if eq .Type "products" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ .Title }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}",
  "url": "{{ .Permalink }}",
  {{ with .Params.images }}
  "image": "{{ index . 0 | absURL }}",
  {{ end }}
  {{ with .Params.price }}
  "offers": {
    "@type": "Offer",
    "price": "{{ . }}",
    "priceCurrency": "USD"
  },
  {{ end }}
  "brand": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}"
  }
}
</script>
{{ end }}

{{ end }}
