<header class="sticky-top header-custom" id="mainHeader">
  <!-- Top Bar with Contact and Search -->
  <div class="bg-primary text-white py-2 transition-colors">
    <div class="container-fluid">
      <div class="d-flex align-items-center justify-content-between gap-3" style="min-height: auto;">
        <!-- Email - Left side, clickable -->
        <a href="mailto:{{ .Site.Params.globals.email.main }}" class="text-white text-decoration-none" style="font-size: 0.85rem; white-space: nowrap;" title="Send email">
          {{ .Site.Params.globals.email.main }}
        </a>
        
        <!-- Search - Right side, very compact -->
        <form class="d-flex" role="search" id="searchForm" style="min-width: 0;">
          <div class="input-group input-group-sm transition-base" style="max-width: 280px;">
            <input class="form-control form-control-focus border-0" type="search" placeholder="Search..." aria-label="Search" id="searchInput" style="font-size: 0.8rem; padding: 0.25rem 0.5rem; height: auto;">
            <button class="btn btn-outline-light icon-hover-bounce" type="submit" title="Search" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg py-3 transition-smooth">
    <div class="container">
      <!-- Logo Brand -->
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center transition-smooth" href="/" title="{{ .Site.Params.globals.name }}" style="gap: 0.75rem;">
        <img src="/images/logo.svg" alt="{{ .Site.Params.globals.logo.alt }}" width="48" height="48" loading="eager" style="transition: transform var(--transition-base) ease;" class="icon-hover-pulse">
        <span class="d-none d-sm-inline" style="font-size: 1.1rem; font-weight: 600;">{{ .Site.Params.globals.name }}</span>
      </a>
      
      <button class="navbar-toggler transition-base" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link link-underline{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL }}" data-animate="fade-in">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
      </div>
    </div>
  </nav>
</header>
