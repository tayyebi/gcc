<header class="sticky-top header-custom" id="mainHeader">
  <!-- Top Bar with Search and Contact -->
  <div class="bg-primary text-white py-2 transition-colors">
    <div class="container">
      <div class="row align-items-center g-2">
        <!-- Search - Left side, compact -->
        <div class="col-12 col-md-5 order-md-first">
          <form class="d-flex" role="search" id="searchForm">
            <div class="input-group input-group-sm transition-base" style="max-width: 300px;">
              <input class="form-control form-control-focus border-0" type="search" placeholder="Search products..." aria-label="Search" id="searchInput" style="font-size: 0.85rem; padding: 0.35rem 0.6rem;">
              <button class="btn btn-outline-light icon-hover-bounce" type="submit" title="Search" style="padding: 0.35rem 0.6rem;">
                <i class="bi bi-search" style="font-size: 0.9rem;"></i>
              </button>
            </div>
          </form>
        </div>
        
        <!-- Email and RSS - Right side -->
        <div class="col-12 col-md-7 text-md-end d-flex justify-content-between justify-content-md-end gap-3 align-items-center">
          <small class="d-flex align-items-center" style="gap: 0.25rem;">
            <i class="bi bi-envelope" style="font-size: 0.85rem;"></i><span class="d-none d-sm-inline">{{ .Site.Params.globals.email.main }}</span>
          </small>
          <small>
            <a href="{{ .Site.Params.globals.social.rss }}" class="text-white text-decoration-none link-underline" aria-label="RSS Feed" title="Subscribe to RSS">
              <i class="bi bi-rss-fill"></i>
            </a>
          </small>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg py-3 transition-smooth">
    <div class="container">
      <!-- Logo Brand -->
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center transition-smooth" href="/" title="{{ .Site.Params.globals.name }}" style="gap: 0.75rem;">
        <img src="{{ .Site.Params.globals.logo.path }}" alt="{{ .Site.Params.globals.logo.alt }}" width="{{ .Site.Params.globals.logo.width }}" height="{{ .Site.Params.globals.logo.height }}" style="transition: transform var(--transition-base) ease;" class="icon-hover-pulse">
        <span class="d-none d-sm-inline" style="font-size: 1.1rem; font-weight: 600;">GCC</span>
      </a>
      
      <button class="navbar-toggler transition-base" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link link-underline{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL }}" data-animate="fade-in">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
      </div>
    </div>
  </nav>
</header>
