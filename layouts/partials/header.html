<header class="sticky-top header-custom" id="mainHeader">
  <!-- Top Bar -->
  <div class="bg-primary text-white py-1">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <small class="d-flex align-items-center">
            <i class="bi bi-envelope me-2"></i>{{ .Site.Params.contact.email }}
          </small>
        </div>
        <div class="col-md-6 text-md-end">
          <small>
            <a href="#" class="text-white text-decoration-none me-2" aria-label="Twitter"><i class="bi bi-twitter" aria-hidden="true"></i></a>
            <a href="#" class="text-white text-decoration-none me-2" aria-label="LinkedIn"><i class="bi bi-linkedin" aria-hidden="true"></i></a>
            <a href="#" class="text-white text-decoration-none" aria-label="Facebook"><i class="bi bi-facebook" aria-hidden="true"></i></a>
          </small>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/" title="Global Commerce Council">
        {{ .Site.Title }}
      </a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto me-3">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
        
        <!-- Search -->
        <form class="d-flex ms-2" role="search" id="searchForm">
          <div class="input-group">
            <input class="form-control" type="search" placeholder="Search products, insights..." aria-label="Search" id="searchInput">
            <button class="btn btn-primary" type="submit" title="Search"><i class="bi bi-search"></i></button>
          </div>
        </form>
      </div>
    </div>
  </nav>
</header>
