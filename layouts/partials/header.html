<header class="sticky-top bg-white shadow-sm">
  <!-- Top Bar -->
  <div class="bg-primary text-white py-2">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <small>
            <i class="bi bi-envelope me-2"></i>{{ .Site.Params.contact.email }}
            <i class="bi bi-telephone ms-3 me-2"></i>{{ .Site.Params.contact.phone }}
          </small>
        </div>
        <div class="col-md-6 text-md-end">
          <small>
            <a href="#" class="text-white text-decoration-none me-2"><i class="bi bi-twitter"></i></a>
            <a href="#" class="text-white text-decoration-none me-2"><i class="bi bi-linkedin"></i></a>
            <a href="#" class="text-white text-decoration-none"><i class="bi bi-facebook"></i></a>
          </small>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">
        {{ .Site.Title }}
      </a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto me-3">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
        
        <!-- Search -->
        <form class="d-flex" role="search" id="searchForm">
          <div class="input-group">
            <input class="form-control" type="search" placeholder="Search..." aria-label="Search" id="searchInput">
            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
          </div>
        </form>
      </div>
    </div>
  </nav>
</header>
