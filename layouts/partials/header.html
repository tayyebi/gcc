<header class="sticky-top header-custom" id="mainHeader">
  <!-- Top Bar with Smooth Transition -->
  <div class="bg-primary text-white py-1 transition-colors">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <small class="d-flex align-items-center">
            <i class="bi bi-envelope me-2"></i>{{ $.Globals.email.main }}
          </small>
        </div>
        <div class="col-md-6 text-md-end">
          <small>
            <a href="{{ .Site.RSSLink | absURL }}" class="text-white text-decoration-none link-underline" aria-label="RSS Feed">
              <i class="bi bi-rss-fill me-1" aria-hidden="true"></i>RSS
            </a>
          </small>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg py-3 transition-smooth">
    <div class="container">
      <!-- Logo Brand -->
      <a class="navbar-brand fw-bold fs-4 d-flex align-items-center transition-smooth" href="/" title="{{ $.Globals.name }}" style="gap: 0.75rem;">
        <img src="{{ $.Globals.logo.path }}" alt="{{ $.Globals.logo.alt }}" width="{{ $.Globals.logo.width }}" height="{{ $.Globals.logo.height }}" style="transition: transform var(--transition-base) ease;" class="icon-hover-pulse">
        <span class="d-none d-sm-inline" style="font-size: 1.1rem; font-weight: 600;">GCC</span>
      </a>
      
      <button class="navbar-toggler transition-base" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto me-3">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link link-underline{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL }}" data-animate="fade-in">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
        
        <!-- Search with Enhanced Interaction -->
        <form class="d-flex ms-2" role="search" id="searchForm">
          <div class="input-group transition-base">
            <input class="form-control form-control-focus" type="search" placeholder="Search products, insights..." aria-label="Search" id="searchInput" data-animate="slide-in-left">
            <button class="btn btn-primary icon-hover-bounce" type="submit" title="Search"><i class="bi bi-search"></i></button>
          </div>
        </form>
      </div>
    </div>
  </nav>
</header>
