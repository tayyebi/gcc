<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}"{{ if .Language.Params.rtl }} dir="rtl"{{ end }}>
{{ partial "head.html" . }}
<body{{ if .Language.Params.rtl }} class="rtl"{{ end }}>
  <a class="visually-hidden-focusable p-3 position-absolute top-0 start-0 bg-primary text-white" href="#main-content" style="z-index: 2000;">{{ i18n "skip_to_content" | default "Skip to content" }}</a>
  {{ partial "header.html" . }}
  
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  
  {{ partial "footer.html" . }}
</body>
</html>
