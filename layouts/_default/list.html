{{ define "main" }}
<div class="container my-5">
  <header class="mb-5 text-center">
    <h1 class="display-4 fw-bold">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="lead text-muted">{{ . }}</p>
    {{ end }}
  </header>
  
  <div class="row g-4">
    {{ range .Paginator.Pages }}
      {{ partial "components/card.html" . }}
    {{ end }}
  </div>
  
  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
