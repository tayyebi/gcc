{{ define "main" }}
<div class="container my-5">
  <div class="row g-5">
    <!-- Sidebar / Header Column -->
    <div class="col-lg-4">
      <div class="sticky-top" style="top: 2rem; z-index: 1;">
        <header class="mb-4">
          <h1 class="display-4 fw-bold mb-3">{{ .Title }}</h1>
          {{ if .Description }}
          <p class="lead text-muted">{{ .Description }}</p>
          {{ end }}
        </header>
        
        <!-- Optional Sidebar Content (e.g., TOC or Last Modified) -->
        <hr class="d-lg-none my-4">
        
        {{ if not .IsHome }}
        <div class="text-muted small mb-3">
          {{ if .PublishDate }}
          <div class="mb-2">
            <i class="bi bi-calendar3 me-2"></i>
            Published: {{ .PublishDate.Format "Jan 2, 2006" }}
          </div>
          {{ end }}
          {{ if .Lastmod }}
          <div class="mb-2">
            <i class="bi bi-clock-history me-2"></i>
            Updated: {{ .Lastmod.Format "Jan 2, 2006" }}
          </div>
          {{ end }}
        </div>
        {{ end }}
      </div>
    </div>

    <!-- Main Content Column -->
    <div class="col-lg-8">
      <div class="content page-content">
        {{ .Content }}
      </div>
    </div>
  </div>
</div>
{{ end }}
