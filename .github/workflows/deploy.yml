name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.147.7'
          extended: true
      
      - name: Update version info in hugo.toml
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +%Y-%m-%d)
          sed -i "s/git_hash = .*/git_hash = \"$GIT_HASH\"/" hugo.toml
          sed -i "s/build_date = .*/build_date = \"$BUILD_DATE\"/" hugo.toml
      
      - name: Build Hugo site
        run: hugo --minify
      
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=globalcommercecouncil
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
