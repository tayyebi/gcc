name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  # pull_request trigger removed to disable preview deployments
  # Only production deployments on push to main will occur

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.121.1'
          extended: true
      
      - name: Update version info in hugo.toml
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +%Y-%m-%d)
          sed -i "s/git_hash = .*/git_hash = \"$GIT_HASH\"/" hugo.toml
          sed -i "s/build_date = .*/build_date = \"$BUILD_DATE\"/" hugo.toml
      
      - name: Build Hugo site
        run: hugo --minify
      
      - name: Publish to Cloudflare Pages
        id: cloudflare-deployment
        continue-on-error: true
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: globalcommercecouncil
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
      
      - name: Deployment status
        if: steps.cloudflare-deployment.outcome == 'failure'
        run: |
          echo "⚠️ Cloudflare Pages deployment failed or was skipped"
          echo ""
          echo "This is likely because required secrets are not configured:"
          echo "  - CLOUDFLARE_API_TOKEN"
          echo "  - CLOUDFLARE_ACCOUNT_ID"
          echo ""
          echo "To enable deployment, please configure these secrets in:"
          echo "Repository Settings > Secrets and variables > Actions"
          echo ""
          echo "See DEPLOYMENT.md for detailed instructions."
          echo ""
          echo "Note: The build succeeded. Only deployment was affected."
