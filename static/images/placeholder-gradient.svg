<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="greyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e5e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d0d0d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666666;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#greyGradient)"/>
  
  <!-- Subtle pattern -->
  <circle cx="100" cy="100" r="80" fill="url(#darkGradient)" opacity="0.1"/>
  <circle cx="700" cy="500" r="100" fill="url(#darkGradient)" opacity="0.1"/>
  <circle cx="400" cy="300" r="60" fill="url(#darkGradient)" opacity="0.08"/>
  
  <!-- Image placeholder icon -->
  <g opacity="0.4">
    <!-- Frame -->
    <rect x="200" y="150" width="400" height="300" fill="none" stroke="#999999" stroke-width="2"/>
    
    <!-- Mountain icon -->
    <path d="M 250 350 L 330 250 L 410 320 L 490 200 L 550 350" fill="none" stroke="#999999" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sun circle -->
    <circle cx="500" cy="200" r="25" fill="none" stroke="#999999" stroke-width="3"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="18" fill="#888888" text-anchor="middle" opacity="0.6">
    Image not available
  </text>
</svg>