<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Glass texture gradient -->
    <radialGradient id="glassGradient" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Node glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="300" cy="300" r="250" fill="url(#glassGradient)" opacity="0.3"/>
  
  <!-- Main globe structure -->
  <g filter="url(#glow)">
    <!-- Globe base -->
    <circle cx="300" cy="300" r="200" fill="none" stroke="rgba(37, 99, 235, 0.3)" stroke-width="2"/>
    
    <!-- Latitude lines -->
    <ellipse cx="300" cy="300" rx="200" ry="60" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="300" rx="200" ry="120" fill="none" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="300" rx="200" ry="180" fill="none" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Longitude lines -->
    <ellipse cx="300" cy="300" rx="60" ry="200" fill="none" stroke="rgba(37, 99, 235, 0.4)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="300" rx="120" ry="200" fill="none" stroke="rgba(37, 99, 235, 0.3)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="300" rx="180" ry="200" fill="none" stroke="rgba(37, 99, 235, 0.2)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="5.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Vertical center line -->
    <line x1="300" y1="100" x2="300" y2="500" stroke="rgba(37, 99, 235, 0.4)" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Data nodes with glow -->
  <g filter="url(#nodeGlow)">
    <!-- North America node -->
    <circle cx="220" cy="200" r="8" fill="#2563EB">
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Europe node -->
    <circle cx="320" cy="180" r="7" fill="#06b6d4">
      <animate attributeName="r" values="5;9;5" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Asia node -->
    <circle cx="400" cy="230" r="9" fill="#22d3ee">
      <animate attributeName="r" values="7;11;7" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Middle East node -->
    <circle cx="350" cy="280" r="6" fill="#2563EB">
      <animate attributeName="r" values="4;8;4" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- South America node -->
    <circle cx="240" cy="380" r="7" fill="#06b6d4">
      <animate attributeName="r" values="5;9;5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Africa node -->
    <circle cx="310" cy="340" r="8" fill="#22d3ee">
      <animate attributeName="r" values="6;10;6" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Light trails connecting nodes -->
  <g opacity="0.4">
    <path d="M 220 200 Q 270 190 320 180" stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 320 180 Q 360 205 400 230" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 400 230 Q 375 255 350 280" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="2.8s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 350 280 Q 330 310 310 340" stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 310 340 Q 275 360 240 380" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 240 380 Q 230 290 220 200" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Outer glass reflection -->
  <circle cx="300" cy="300" r="200" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="3" opacity="0.3"/>
  <ellipse cx="280" cy="260" rx="80" ry="100" fill="rgba(255, 255, 255, 0.15)" opacity="0.2" transform="rotate(-25 280 260)"/>
</svg>
