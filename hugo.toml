baseURL = "https://globalcommercecouncil.com"
languageCode = "en-us"
title = "Global Commerce Council"
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

# Pagination settings
[pagination]
  pagerSize = 12

# Build settings
[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[params]
  description = "Global Commerce Council - Connecting businesses worldwide through commerce in Ceramics, Gypsum, Petroleum, and more."
  author = "Global Commerce Council"
  images = ["/images/og-image.jpg"]
  
  [params.seo]
    twitter_card = "summary_large_image"
    twitter_site = "@globalcommerce"
    fb_app_id = ""

  [params.contact]
    email = "info@globalcommercecouncil.com"
    phone = "+1 (555) 123-4567"

  # Single Source of Truth for Key Metrics
  [params.stats]
    countries = "4+"
    partners = "100+"
    avg_response = "72hrs"
    growth_rate = "45%"
    satisfaction = "98%"
    transactions = "10K+"

  # ========================================
  # DESIGN SYSTEM CONFIGURATION
  # Single source of truth for animations and interactions
  # ========================================
  [params.design]
    # Animation Timings (in milliseconds)
    [params.design.timing]
      fast = 100
      base = 150
      normal = 200
      slow = 300
      slower = 400
      slowest = 500
    
    # Spacing Scale (in rem units)
    [params.design.spacing]
      xs = "0.25rem"
      sm = "0.5rem"
      md = "1rem"
      lg = "1.5rem"
      xl = "2rem"
      "2xl" = "3rem"
      "3xl" = "4rem"
    
    # Border Radius Values
    [params.design.radius]
      xs = "2px"
      sm = "4px"
      md = "8px"
      lg = "12px"
      xl = "16px"
      full = "9999px"
    
    # Animation Easing Functions
    [params.design.easing]
      linear = "linear"
      "in" = "ease-in"
      out = "ease-out"
      "in-out" = "ease-in-out"
      smooth = "cubic-bezier(0.4, 0, 0.2, 1)"
      bounce = "cubic-bezier(0.68, -0.55, 0.265, 1.55)"
    
    # Color Palette Reference
    [params.design.colors]
      primary = "#2563EB"
      primary_dark = "#1E40AF"
      primary_light = "#60A5FA"
      success = "#10B981"
      danger = "#EF4444"
      warning = "#F59E0B"
      info = "#0EA5E9"
    
    # Z-Index Scale
    [params.design.zindex]
      hide = "-1"
      base = "0"
      dropdown = "100"
      sticky = "500"
      fixed = "1000"
      modal = "1100"
      tooltip = "1300"
      notification = "1400"
      skiplink = "2000"
    
    # Component-Specific Configuration
    [params.design.components]
      card_shadow = "0 10px 15px -3px rgba(0,0,0,0.05)"
      card_radius = "12px"
      button_padding = "0.625rem 1.5rem"
      input_padding = "0.625rem 1rem"
      badge_padding = "0.25rem 0.75rem"

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 2
  
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 3
  
  [[menu.main]]
    identifier = "products"
    name = "Products"
    url = "/products/"
    weight = 4
  
  [[menu.main]]
    identifier = "insights"
    name = "Insights"
    url = "/insights/"
    weight = 5
  
  [[menu.main]]
    identifier = "hscode"
    name = "HS Code"
    url = "/hscode/"
    weight = 6
  
  [[menu.main]]
    identifier = "suppliers"
    name = "Suppliers"
    url = "/suppliers/"
    weight = 7
  
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 8

